<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>創作OCメーカー</title>
<style>
:root{
  --bg:#F2F0EB;
  --card:#FFFFFF;
  --ink:#2D2A33;
  --sub:#6E6879;
  --line:#E4E1D9;
  --accent:#5A4B8B;
  --accent-deep:#463A70;
  --accent-soft:#EEEBF7;
  --wine:#8E4257;
  --wine-soft:#F6ECEF;
  --blue:#5A6E8C;
  --radius:14px;
  --serif:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif;
  --sans:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","YuGothic","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  line-height:1.7;
  padding:0 14px calc(40px + env(safe-area-inset-bottom));
}
.wrap{max-width:720px;margin:0 auto;}

/* ---------- header ---------- */
header{padding:30px 4px 18px;text-align:center;}
header h1{
  font-family:var(--serif);
  font-size:1.9rem;
  letter-spacing:.14em;
  margin:0 0 6px;
  color:var(--accent-deep);
}
header .sub{
  font-family:var(--serif);
  font-size:.92rem;
  color:var(--sub);
  margin:0 0 10px;
  letter-spacing:.05em;
}
header .desc{font-size:.82rem;color:var(--sub);margin:0;}
header .rule{
  width:56px;height:2px;background:var(--accent);
  margin:14px auto 0;opacity:.5;
}

/* ---------- mode ---------- */
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0 16px;}
.mode-btn{
  border:1.5px solid var(--line);
  background:var(--card);
  color:var(--sub);
  border-radius:12px;
  padding:14px 4px 12px;
  font-size:.9rem;
  font-weight:600;
  cursor:pointer;
  transition:all .15s;
  font-family:var(--sans);
}
.mode-btn small{display:block;font-weight:400;font-size:.68rem;margin-top:3px;opacity:.75;}
.mode-btn.on{
  border-color:var(--accent);
  background:var(--accent);
  color:#fff;
  box-shadow:0 3px 10px rgba(90,75,139,.28);
}

/* ---------- name attach input ---------- */
#nameInputWrap{display:none;margin:0 0 14px;}
#nameInputWrap.show{display:block;}
#nameInputWrap label{font-size:.8rem;color:var(--sub);display:block;margin-bottom:5px;}
#nameInput{
  width:100%;padding:12px;border:1.5px solid var(--line);
  border-radius:10px;font-size:1rem;background:var(--card);
  font-family:var(--sans);color:var(--ink);
}
#nameInput:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}

/* ---------- conditions ---------- */
details.cond{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  margin-bottom:10px;
  overflow:hidden;
}
details.cond summary{
  list-style:none;
  cursor:pointer;
  padding:13px 16px;
  font-weight:600;
  font-size:.92rem;
  display:flex;align-items:center;justify-content:space-between;
  color:var(--ink);
}
details.cond summary::-webkit-details-marker{display:none;}
details.cond summary .sel{
  font-weight:400;font-size:.74rem;color:var(--accent);
  max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
details.cond summary::after{
  content:"▾";color:var(--sub);font-size:.8rem;margin-left:8px;
  transition:transform .15s;
}
details.cond[open] summary::after{transform:rotate(180deg);}
.chip-box{padding:2px 12px 14px;display:flex;flex-wrap:wrap;gap:7px;}
.chip{
  border:1.5px solid var(--line);
  background:#FAF9F6;
  color:var(--ink);
  border-radius:999px;
  padding:8px 14px;
  font-size:.84rem;
  cursor:pointer;
  transition:all .12s;
  font-family:var(--sans);
}
.chip.on{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}
.cond-note{width:100%;font-size:.72rem;color:var(--sub);margin:2px 2px 0;}

/* ---------- generate ---------- */
.gen-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0 8px;}
.btn{
  border:none;border-radius:12px;cursor:pointer;
  font-family:var(--sans);font-weight:700;
  transition:transform .1s, box-shadow .15s;
}
.btn:active{transform:scale(.97);}
.btn-gen{
  background:var(--accent);color:#fff;
  padding:16px 8px;font-size:1.02rem;
  box-shadow:0 4px 12px rgba(90,75,139,.3);
}
.btn-gen.multi{background:var(--accent-deep);}
.gen-sub{display:flex;gap:10px;justify-content:center;margin-bottom:6px;}
.btn-ghost{
  background:none;border:1.5px solid var(--line);color:var(--sub);
  border-radius:999px;padding:8px 16px;font-size:.8rem;font-weight:600;
}

/* ---------- result cards ---------- */
#results{margin-top:10px;}
.res-head{
  font-family:var(--serif);font-size:1.05rem;letter-spacing:.1em;
  color:var(--accent-deep);margin:22px 2px 10px;
  display:none;
}
.res-head.show{display:block;}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px 18px 14px;
  margin-bottom:14px;
  box-shadow:0 2px 8px rgba(45,42,51,.05);
}
.card .world-tag{
  display:inline-block;font-size:.7rem;color:var(--accent);
  border:1px solid var(--accent);border-radius:999px;
  padding:2px 10px;margin-bottom:10px;letter-spacing:.05em;
}
.card .catch{
  font-family:var(--serif);
  font-size:1.02rem;
  line-height:1.6;
  color:var(--ink);
  border-left:3px solid var(--accent);
  padding-left:12px;
  margin:0 0 12px;
  letter-spacing:.04em;
}
.card .name-line{margin:0 0 2px;}
.card .name-line .nm{
  font-family:var(--serif);font-size:1.45rem;font-weight:600;
  letter-spacing:.08em;color:var(--ink);
}
.card .name-line .rd{font-size:.78rem;color:var(--sub);margin-left:8px;}
.card .roman{font-size:.78rem;color:var(--blue);letter-spacing:.06em;margin:0 0 10px;}
.card dl{margin:0;}
.card .row{
  display:grid;grid-template-columns:88px 1fr;gap:8px;
  padding:6px 0;border-top:1px dashed var(--line);
  font-size:.86rem;
}
.card .row dt{color:var(--sub);font-size:.78rem;padding-top:2px;}
.card .row dd{margin:0;}
.card .sec-label{
  font-size:.72rem;color:var(--accent);letter-spacing:.15em;
  margin:14px 0 2px;font-weight:700;
}
.card .prompt{
  font-size:.76rem;background:#F6F5F1;border-radius:8px;
  padding:9px 11px;color:#4A4552;word-break:break-all;
  border:1px solid var(--line);line-height:1.55;
}
.card-actions{
  display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;
  border-top:1px solid var(--line);padding-top:12px;
}
.btn-sm{
  border-radius:999px;padding:8px 13px;font-size:.78rem;font-weight:600;
  border:1.5px solid var(--line);background:#FAF9F6;color:var(--ink);
  cursor:pointer;font-family:var(--sans);
}
.btn-sm.save{background:var(--wine);border-color:var(--wine);color:#fff;}
.btn-sm.save:disabled{background:var(--wine-soft);border-color:var(--wine-soft);color:var(--wine);opacity:.9;}
.btn-sm.copy{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

/* ---------- saved ---------- */
#savedWrap{margin-top:34px;}
#savedWrap h2{
  font-family:var(--serif);font-size:1.15rem;letter-spacing:.12em;
  color:var(--accent-deep);margin:0 0 4px;
}
#savedWrap .saved-note{font-size:.76rem;color:var(--sub);margin:0 0 10px;}
.saved-actions{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.saved-item{
  background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:13px 15px;margin-bottom:9px;
}
.saved-item .s-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.saved-item .s-name{font-family:var(--serif);font-weight:600;font-size:1.05rem;letter-spacing:.05em;}
.saved-item .s-imp{font-size:.75rem;color:var(--sub);}
.saved-item .s-detail{
  display:none;margin-top:10px;font-size:.8rem;white-space:pre-wrap;
  background:#F8F7F3;border-radius:8px;padding:10px 12px;
  border:1px solid var(--line);line-height:1.65;
}
.saved-item.open .s-detail{display:block;}
.saved-item .s-actions{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
.btn-danger{border-color:#D8B9BF;color:var(--wine);background:#FDF7F8;}
.empty-msg{
  font-size:.82rem;color:var(--sub);text-align:center;
  padding:18px 10px;border:1.5px dashed var(--line);border-radius:12px;
  background:rgba(255,255,255,.5);
}

/* ---------- toast / fallback ---------- */
#toast{
  position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;font-size:.82rem;
  padding:10px 20px;border-radius:999px;opacity:0;
  pointer-events:none;transition:all .25s;z-index:50;
  white-space:nowrap;
}
#toast.show{opacity:.95;transform:translateX(-50%) translateY(0);}
#copyFallback{
  display:none;position:fixed;inset:0;background:rgba(45,42,51,.5);
  z-index:60;padding:24px 16px;
}
#copyFallback.show{display:flex;align-items:center;justify-content:center;}
#copyFallback .fb-box{
  background:var(--card);border-radius:14px;padding:16px;max-width:560px;width:100%;
}
#copyFallback textarea{
  width:100%;height:180px;font-size:.8rem;border:1px solid var(--line);
  border-radius:8px;padding:8px;font-family:var(--sans);
}
footer{
  text-align:center;font-size:.7rem;color:var(--sub);
  margin-top:36px;font-family:var(--serif);letter-spacing:.1em;
}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important;}
}
@media (min-width:600px){
  .chip{font-size:.86rem;}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <h1>創作OCメーカー</h1>
  <p class="sub">名前だけ、設定だけ、まるごとお任せ。</p>
  <p class="desc">世界観や雰囲気を選んでボタンを押すだけ。創作キャラの「種」をすぐ作れるOC生成ツールです。</p>
  <div class="rule"></div>
</header>

<nav class="mode-grid" id="modeBtns"></nav>

<div id="nameInputWrap">
  <label for="nameInput">この名前に設定をつける（任意）</label>
  <input type="text" id="nameInput" placeholder="例：佐伯 丞（空欄なら設定のみ生成）">
</div>

<section id="conditions"></section>

<div class="gen-row">
  <button class="btn btn-gen" id="btnGen1">1人生成</button>
  <button class="btn btn-gen multi" id="btnGen5">5人生成</button>
</div>
<div class="gen-sub">
  <button class="btn-ghost" id="btnReset">条件リセット</button>
  <button class="btn-ghost" id="btnRandom">条件ランダム</button>
</div>

<h2 class="res-head" id="resHead">― 生成結果 ―</h2>
<section id="results"></section>

<section id="savedWrap">
  <h2>保存リスト</h2>
  <p class="saved-note">気に入ったキャラはこの端末（ブラウザ）に保存されます。</p>
  <div class="saved-actions">
    <button class="btn-sm" id="btnCopyAllSaved">まとめてコピー</button>
    <button class="btn-sm btn-danger" id="btnClearSaved">全削除</button>
  </div>
  <div id="savedList"></div>
</section>

<footer>創作OCメーカー v1.1</footer>
</div>

<div id="toast"></div>
<div id="copyFallback">
  <div class="fb-box">
    <p style="font-size:.8rem;margin:0 0 8px;">自動コピーできませんでした。以下を長押しでコピーしてください。</p>
    <textarea id="fbText" readonly></textarea>
    <div style="text-align:right;margin-top:8px;">
      <button class="btn-sm" id="fbClose">閉じる</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============================================================
   データ定義（後から増やしやすいよう、すべてこの区画にまとめる）
   ============================================================ */

/* ---- 世界観 ---- */
const worldDefs = {
  modern:      {label:"現代日本",        nameKey:"japanese", group:"modern",  en:"modern Japanese setting",       scene:"city street at dusk"},
  school:      {label:"学園",            nameKey:"japanese", group:"modern",  en:"modern school setting",         scene:"quiet classroom after school"},
  work:        {label:"職業もの",        nameKey:"japanese", group:"modern",  en:"modern workplace setting",      scene:"office at night"},
  wafu:        {label:"和風",            nameKey:"wafu",     group:"wafu",    en:"traditional Japanese setting",  scene:"old wooden townscape"},
  wafuFantasy: {label:"和風ファンタジー", nameKey:"wafu",     group:"wafu",    en:"Japanese fantasy setting",      scene:"shrine in the mist"},
  western:     {label:"西洋ファンタジー", nameKey:"western",  group:"western", en:"western fantasy setting",       scene:"old stone city"},
  royal:       {label:"王侯貴族",        nameKey:"western",  group:"western", en:"royal court setting",           scene:"candlelit palace hall"},
  chinese:     {label:"中華・東洋風",    nameKey:"chinese",  group:"chinese", en:"east asian fantasy setting",    scene:"lantern-lit courtyard"},
  desert:      {label:"砂漠幻想風",      nameKey:"desert",   group:"desert",  en:"desert fantasy setting",        scene:"moonlit oasis"},
  dark:        {label:"ダークファンタジー",nameKey:"western", group:"western", en:"dark fantasy setting",          scene:"ruined cathedral"},
  scifi:       {label:"近未来・SF",      nameKey:"scifi",    group:"scifi",   en:"near future sci-fi setting",    scene:"neon-lit corridor"},
  cyber:       {label:"サイバーパンク",  nameKey:"scifi",    group:"scifi",   en:"cyberpunk setting",             scene:"rainy neon street"},
  steam:       {label:"スチームパンク",  nameKey:"western",  group:"steam",   en:"steampunk setting",             scene:"clockwork workshop"},
  ability:     {label:"現代異能",        nameKey:"japanese", group:"modern",  en:"modern supernatural setting",   scene:"city rooftop at night"},
  nonhuman:    {label:"人外・異種族",    nameKey:"western",  group:"western", en:"fantasy setting",               scene:"deep ancient forest"},
  mixed:       {label:"和洋折衷",        nameKey:"mixed",    group:"modern",  en:"japanese-western fusion setting",scene:"retro modern mansion"}
};
const worldOrder = ["modern","school","work","wafu","wafuFantasy","western","royal","chinese","desert","dark","scifi","cyber","steam","ability","nonhuman","mixed","random"];

/* ---- 性別・印象 ---- */
const genderDefs = {
  male:      {label:"男性",     pool:"male",    age:[18,45], en:"man",              noun:"男"},
  female:    {label:"女性",     pool:"female",  age:[18,45], en:"woman",            noun:"女"},
  neutral:   {label:"中性的",   pool:"neutral", age:[16,30], en:"androgynous person",noun:"人"},
  boy:       {label:"少年",     pool:"male",    age:[12,18], en:"teenage boy",      noun:"少年"},
  girl:      {label:"少女",     pool:"female",  age:[12,18], en:"teenage girl",     noun:"少女"},
  youngMan:  {label:"青年",     pool:"male",    age:[18,29], en:"young man",        noun:"青年"},
  adultMan:  {label:"成人男性", pool:"male",    age:[25,45], en:"adult man",        noun:"男"},
  adultWoman:{label:"成人女性", pool:"female",  age:[25,45], en:"adult woman",      noun:"女"},
  older:     {label:"年上",     pool:"any",     age:[30,50], en:"mature adult",     noun:"人"},
  younger:   {label:"年下",     pool:"any",     age:[16,24], en:"young person",     noun:"人"},
  nonhuman:  {label:"人外",     pool:"any",     age:[16,40], en:"non-human being",  noun:"存在", inhuman:true},
  unspecified:{label:"指定なし", pool:"any",    age:[15,45], en:"person",           noun:"人"}
};
const genderOrder = ["male","female","neutral","boy","girl","youngMan","adultMan","adultWoman","older","younger","nonhuman","unspecified"];

/* ---- 雰囲気（性格・口調・キャッチコピー・英語タグの素材を各moodが持つ）---- */
const moodDefs = {
  "優しい":   {en:"gentle atmosphere",  pers:["人の痛みに敏感で、頼まれる前に手を貸してしまう。","強い言葉を使わず、相手のペースを崩さない。"], catch:["優しさを疑われたことのない","誰にでも優しく、誰のものにもならない"], speech:"穏やかで柔らかい話し方。否定から入らない。"},
  "冷たい":   {en:"cold aloof atmosphere", pers:["感情を表に出さず、必要なことだけを端的に処理する。","距離を詰めてくる相手ほど冷静に観察する。"], catch:["体温を見せない","冷たさで自分を守っている"], speech:"短く、平坦。無駄な相槌を打たない。"},
  "高貴":     {en:"noble elegant aura", pers:["立ち居振る舞いに育ちの良さがにじみ、無作法を嫌う。","責任を負うことを当然と考えている。"], catch:["生まれながらに背筋の伸びた","誇りを脱げない"], speech:"格式のある丁寧な言葉遣い。命じることに慣れている。"},
  "儚い":     {en:"fragile ephemeral presence", pers:["どこか消えてしまいそうな印象を周囲に与える。","自分の存在が長く続くと思っていない節がある。"], catch:["朝の光に透けそうな","いつか消えることを知っている"], speech:"声が細く、言葉数が少ない。語尾が消え入りがち。"},
  "色気がある":{en:"alluring atmosphere", pers:["視線や間の取り方が妙に艶っぽく、本人は無自覚を装う。","相手の反応を楽しむ余裕がある。"], catch:["視線ひとつで場を支配する","艶を隠す気のない"], speech:"低めの声でゆっくり話す。語尾に含みを残す。"},
  "知的":     {en:"intelligent atmosphere", pers:["物事をまず構造で捉え、感情論を後回しにする。","知らないことを知らないと言える誠実さがある。"], catch:["理性で感情を縛っている","答えより問いを愛する"], speech:"論理的で整った話し方。たまに皮肉が混ざる。"},
  "真面目":   {en:"earnest serious air", pers:["決めたことは守る。手を抜くという発想がない。","融通が利かない自覚はあるが、直す気もあまりない。"], catch:["不器用なほどまっすぐな","正しさに殉じかねない"], speech:"折り目正しく丁寧。冗談が通じにくい。"},
  "危うい":   {en:"unstable dangerous air", pers:["普段は穏やかだが、どこか均衡の崩れそうな気配がある。","一線を越えることへのためらいが薄い。"], catch:["壊れる音を待っている","善悪の境界線の上で笑う"], speech:"柔らかいのに、時々ぞっとする一言を挟む。"},
  "狂気":     {en:"mad unhinged aura", pers:["独自の論理で世界が完結しており、他人の常識が通用しない。","楽しそうに笑う瞬間ほど周囲は緊張する。"], catch:["正気のふりが上手い","愛し方を間違え続ける"], speech:"妙に明るい。話が急に飛ぶ。"},
  "明るい":   {en:"bright cheerful aura", pers:["場の空気を軽くするのがうまく、初対面でも懐に入る。","落ち込んでいる姿をあまり人に見せない。"], catch:["太陽の役を降りられない","明るさの裏に鍵をかけた"], speech:"テンポが良く、よく笑う。"},
  "陽気":     {en:"lively jovial mood", pers:["祭りごとと騒ぎが好きで、静けさが少し苦手。","細かいことを気にしない胆力がある。"], catch:["宴の真ん中がよく似合う","笑い声で不安をかき消す"], speech:"声が大きく、冗談が多い。"},
  "無邪気":   {en:"innocent playful aura", pers:["興味の赴くままに動き、計算というものをしない。","その無防備さが周囲を振り回すことがある。"], catch:["悪意を知らない目をした","無邪気という名の凶器"], speech:"素直でストレート。思ったことがそのまま口に出る。"},
  "ミステリアス":{en:"mysterious enigmatic presence", pers:["経歴も目的も語らず、質問をやわらかくかわす。","肝心なところで必ず一歩引いた場所にいる。"], catch:["正体を明かさないまま隣にいる","謎のままでいることを選んだ"], speech:"質問に質問で返す。核心には触れさせない。"},
  "闇がある": {en:"shadowed brooding aura", pers:["過去に触れられると一瞬だけ表情が消える。","自分の暗部を他人に背負わせない主義。"], catch:["夜を一人で抱えている","過去に鍵をかけて生きる"], speech:"普段は普通だが、特定の話題で急に口が重くなる。"},

/* ============================================================
   ユーティリティ
   ============================================================ */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function pickN(arr,n){
  const copy = arr.slice(); const out = [];
  while(copy.length && out.length < n){
    out.push(copy.splice(Math.floor(Math.random()*copy.length),1)[0]);
  }
  return out;
}
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function makeId(){ return Date.now().toString() + "-" + Math.random().toString(36).slice(2); }

/* タグと雰囲気の一致を優先しつつ抽選（pickFromPool） */
function pickFromPool(pool, moods){
  if(!pool || !pool.length) return null;
  if(moods && moods.length){
    const matched = pool.filter(item => item.tags && item.tags.some(t => moods.includes(t)));
    if(matched.length && Math.random() < 0.75) return pick(matched);
  }
  return pick(pool);
}

/* ============================================================
   雰囲気語の日本語活用（v1.1）
   連体形（〜な／〜のある）と連用形（〜で、／〜があり、）に変換する。
   新しい雰囲気語を追加したら、規則で崩れる場合のみ moodFormEx に例外を足す。
   ============================================================ */
const moodFormEx = {
  "透明感": {mod:"透明感のある", cont:"透明感があり、"},
  "執着":   {mod:"執着の強い",   cont:"執着が強く、"},
  "献身":   {mod:"献身的な",     cont:"献身的で、"},
  "狂気":   {mod:"狂気を秘めた", cont:"狂気を秘め、"}
};
function moodModifier(m){
  if(moodFormEx[m]) return moodFormEx[m].mod;
  if(m.endsWith("がある")) return m.slice(0,-3) + "のある";  // 色気がある→色気のある
  if(m.endsWith("い")) return m;                              // 儚い・影が薄い はそのまま
  return m + "な";                                            // 知的→知的な
}
function moodContinuative(m){
  if(moodFormEx[m]) return moodFormEx[m].cont;
  if(m.endsWith("がある")) return m.slice(0,-3) + "があり、"; // 余裕がある→余裕があり、
  if(m.endsWith("い")) return m.slice(0,-1) + "く、";         // 影が薄い→影が薄く、
  return m + "で、";                                          // ミステリアス→ミステリアスで、
}
/* 雰囲気語配列 → 自然な修飾句。「お任せ」と空値と重複はここで除外する */
function moodPhrase(words){
  const ms = [...new Set((words||[]).filter(w => w && w !== "お任せ"))];
  if(!ms.length) return "";
  if(ms.length === 1) return moodModifier(ms[0]);
  return ms.slice(0,-1).map(moodContinuative).join("") + moodModifier(ms[ms.length-1]);
}

   ============================================================ */
function poolGender(genderKey){
  const def = genderDefs[genderKey];
  if(def.pool === "any") return pick(["male","female","neutral"]);
  return def.pool;
}
function filterByG(list, pg){
  const map = {male:"m", female:"f", neutral:"n"};
  const want = map[pg];
  let out = list.filter(n => n.g === want);
  if(pg === "neutral" && !out.length) out = list;
  if(!out.length) out = list;
  return out;
}

function generateName(worldKey, genderKey, moods){
  const world = worldDefs[worldKey];
  const key = world.nameKey;
  const pg = poolGender(genderKey);

  if(key === "japanese" || key === "wafu"){
    const data = nameData[key];
    const sur = pickFromPool(data.surnames, moods);
    let givenPool = data.givenNames[pg] || data.givenNames.neutral;
    // 中性的指定は neutral 優先
    const giv = pickFromPool(givenPool, moods);
    return {
      display: sur.kanji + " " + giv.kanji,
      reading: sur.reading + " " + giv.reading,
      roman: giv.roman + " " + sur.roman,
      tags: (sur.tags||[]).concat(giv.tags||[])
    };
  }
  if(key === "western"){
    const data = nameData.western;
    const giv = pickFromPool(filterByG(data.givenNames, pg), moods);
    const famPool = (worldKey === "royal" || (worldKey === "dark" && Math.random() < 0.3))
      ? data.nobleNames
      : (Math.random() < 0.25 ? data.nobleNames : data.familyNames);
    // 人外は姓を持たないことがある
    if(worldKey === "nonhuman" && Math.random() < 0.5){
      return {display:giv.kana, reading:giv.kana, roman:giv.roman, tags:giv.tags||[]};
    }
    const fam = pickFromPool(famPool, moods);
    return {
      display: giv.kana + "・" + fam.kana,
      reading: giv.kana + "・" + fam.kana,
      roman: giv.roman + " " + fam.roman,
      tags: (giv.tags||[]).concat(fam.tags||[])
    };
  }
  if(key === "chinese"){
    const data = nameData.chinese;
    const sur = pick(data.surnames);
    const givenPool = data.givenNames[pg] || data.givenNames.neutral;
    const giv = pickFromPool(givenPool, moods);
    return {
      display: sur.kanji + giv.kanji,
      reading: sur.reading + "・" + giv.reading,
      roman: sur.roman + " " + giv.roman,
      tags: giv.tags||[]
    };
  }
  if(key === "desert"){
    const data = nameData.desert;
    const giv = pickFromPool(filterByG(data.givenNames, pg), moods);
    if(Math.random() < 0.65){
      const fam = pick(data.familyNames);
      return {
        display: giv.kana + "・" + fam.kana,
        reading: giv.kana + "・" + fam.kana,
        roman: giv.roman + " " + fam.roman,
        tags: giv.tags||[]
      };
    }
    return {display:giv.kana, reading:giv.kana, roman:giv.roman, tags:giv.tags||[]};
  }
  if(key === "scifi"){
    const data = nameData.scifi;
    const giv = pick(filterByG(data.givenNames, pg));
    const code = pick(data.codenames);
    return {
      display: giv.kana,
      reading: giv.kana,
      roman: giv.roman,
      codename: code.kana + "（" + code.roman + "）",
      tags: []
    };
  }
  if(key === "mixed"){
    const sur = pickFromPool(nameData.japanese.surnames, moods);
    const giv = pickFromPool(filterByG(nameData.western.givenNames, pg), moods);
    return {
      display: sur.kanji + " " + giv.kana,
      reading: sur.reading + " " + giv.kana,
      roman: giv.roman + " " + sur.roman,
      tags: (sur.tags||[]).concat(giv.tags||[])
    };
  }
  return {display:"名無し", reading:"ななし", roman:"Nanashi", tags:[]};
}

function buildAge(genderKey, worldKey){
  const def = genderDefs[genderKey];
  const inhuman = def.inhuman || worldKey === "nonhuman";
  const [a,b] = def.age;
  const apparent = randInt(a,b);
  if(inhuman && Math.random() < 0.75){
    const real = randInt(120, 900);
    return {text:"外見年齢 " + apparent + "歳程度（実年齢 " + real + "年以上）", num:apparent};
  }
  return {text: apparent + "歳", num:apparent};
}

function buildOccupation(worldKey, roles){
  const group = worldDefs[worldKey].group;
  for(const r of roles){
    const def = roleDefs[r];
    if(def && def.conv){
      return def.conv[group] || def.conv.modern || def.label;
    }
  }
  // 役割が関係性寄り or 未選択 → 世界観プールから
  const pool = occupationPools[group] || occupationPools.modern;
  return pick(pool);
}

function buildAppearance(worldKey, moods, ageNum, roles){
  const group = worldDefs[worldKey].group;
  const hc = pick(hairColors), hs = pick(hairStyles);
  const eye = pick(eyeLooks), bd = pick(builds);
  let outfit = pick(outfitPools[group] || outfitPools.modern);
  const hintRole = (roles || []).find(r => roleOutfits[r]);
  if(hintRole && Math.random() < 0.75){
    outfit = roleOutfits[hintRole];
  } else if(group === "modern" && ageNum <= 18 && Math.random() < 0.6){
    outfit = {ja:"制服", en:"school uniform"};
  }
  const aura = pick(auras);
  const ja = hs.ja + hc.ja + "。" + eye.ja + "。" + bd.ja + "で、" + outfit.ja + "が似合う。" + aura.ja;
  return {
    ja,
    en:{hair: hs.en + " " + hc.en, eye: eye.en, build: bd.en, outfit: outfit.en, aura: aura.en}
  };
}

function buildPersonality(moods){
  const ms = pickN(moods, Math.min(2, moods.length));
  const parts = ms.map(m => pick(moodDefs[m].pers));
  return parts.join("");
}

}

  });
  const spCands = secondPersons.filter(sp => {
    if(sp.groups !== "all" && !sp.groups.includes(group)) return false;
    if(sp.minAge && ageNum < sp.minAge) return false;
    if(sp.special === "inhumanOrRoyal" && !(isRoyal || isInhuman)) return false;
    if(sp.special === "harsh" && Math.random() < 0.7) return false;
    return true;
  });
  return {
    first: fpCands.length ? pick(fpCands).word : "私",
    second: spCands.length ? pick(spCands).word : "あなた"
  };
}

function buildRelationSeed(rels){
  if(rels.length){
    const r = pick(rels);
    return "【" + r + "】" + relDefs[r];
  }
  const key = pick(Object.keys(relDefs));
  return "【" + key + "】" + relDefs[key];
}

function buildStoryRole(roles){
  for(const r of roles){
    if(roleDefs[r] && roleDefs[r].story) return roleDefs[r].story;
  }
  return pick(storyRolePool);
}

function buildCatch(moods, genderKey){
  const m = pick(moods);
  const noun = genderDefs[genderKey].noun;
  return pick(moodDefs[m].catch) + noun;
}

function buildImagePromptData(character){
  const w = worldDefs[character.worldKey];
  const g = genderDefs[character.genderKey];
  const ap = character.appearanceEn;
  const moodEn = pickN(character.moods, Math.min(2, character.moods.length)).map(m => moodDefs[m].en);
  const expr = pick(expressions);
  const parts = [g.en, ap.hair, ap.eye, ap.build, ap.outfit]
    .concat(moodEn)
    .concat([w.en, w.scene, expr.en, "clean character design"]);
  return parts.join(", ");
}

function generateFullCharacter(opts){
  const worldKey = resolveWorldKey();
  const genderKey = resolveGenderKey();
  const moods = resolveMoods();
  const roles = resolveRoles();
  const rels = resolveRels();
  const mode = currentMode;

  const c = {
    id: makeId(),
    mode, worldKey, genderKey, moods,
    worldLabel: worldDefs[worldKey].label,
    genderLabel: genderDefs[genderKey].label
  };

  if(mode !== "settingOnly"){
    const nm = generateName(worldKey, genderKey, moods);
    c.name = nm.display; c.reading = nm.reading; c.roman = nm.roman;
    c.codename = nm.codename || null;
    c.nameTags = nm.tags || [];
  } else {
    const manual = document.getElementById("nameInput").value.trim();
    if(manual){ c.name = manual; c.manualName = true; }
  }

  if(mode === "nameOnly"){
    const tagWords = [...new Set((c.nameTags||[]).filter(t => t && t !== "お任せ"))].slice(0,3);
    const impressionSrc = tagWords.length ? tagWords : pickN(moods, Math.min(2, moods.length));
    const phrase = moodPhrase(impressionSrc);
    c.nameImpression = phrase ? phrase + "印象の名前。" : "静かな印象の名前。";
    const occ = buildOccupation(worldKey, roles);
    const m2 = pickN(moods, Math.min(2, moods.length));
    c.suitedFor = worldDefs[worldKey].label + "の世界観で、「" + m2.join("」「") + "」系の人物──たとえば" + occ + "などに向く。";
    return c;
  }

  const age = buildAge(genderKey, worldKey);
  const app = buildAppearance(worldKey, moods, age.num, roles);
  const pron = buildPronouns(worldKey, genderKey, roles, age.num);

  c.age = age.text;
  const impPhrase = moodPhrase(pickN(moods, Math.min(2,moods.length)));
  c.genderImp = genderDefs[genderKey].label + (impPhrase ? "（" + impPhrase + "印象）" : "");
  c.occupation = buildOccupation(worldKey, roles);
  const hasOccRole = roles.some(r => roleDefs[r] && roleDefs[r].conv);
  const isInhumanC = worldKey === "nonhuman" || genderKey === "nonhuman";
  if(age.num <= 18 && !hasOccRole && !isInhumanC && Math.random() < 0.8){
    c.occupation = roleDefs.student.conv[worldDefs[worldKey].group] || "学生";
  }
  c.appearance = app.ja;
  c.appearanceEn = app.en;
  c.personality = buildPersonality(moods);
  c.speech = buildSpeech(moods);
  c.first = pron.first;
  c.second = pron.second;
  c.likes = pickN(likesPool, randInt(2,3)).join("、");
  c.dislikes = pickN(dislikesPool, 2).join("、");
  c.strength = pick(strengthsPool);
  c.weakness = pick(weaknessesPool);
  c.secret = pick(secretsPool);
  c.relationSeed = buildRelationSeed(rels);
  c.storyRole = buildStoryRole(roles);
  c.catch = buildCatch(moods, genderKey);
  c.imagePrompt = buildImagePromptData(c);
  return c;
}

function generateMultiple(count){
  const out = [];
  const usedNames = new Set();
  const usedCatch = new Set();
  const usedSurnames = new Set();
  for(let i=0;i<count;i++){
    let ch = null;
    for(let retry=0; retry<8; retry++){
      ch = generateFullCharacter();
      const nameKey = ch.name || ch.catch || Math.random();
      const surname = ch.name && !ch.manualName ? ch.name.split(/[ ・]/)[0] : null;
      if(usedNames.has(nameKey)) continue;
      if(ch.catch && usedCatch.has(ch.catch)) continue;
      if(surname && usedSurnames.has(surname) && retry < 5) continue; // 苗字被りは緩やかに回避
      break;
    }
    if(ch.name) usedNames.add(ch.name);
    if(ch.name && !ch.manualName) usedSurnames.add(ch.name.split(/[ ・]/)[0]);
    if(ch.catch) usedCatch.add(ch.catch);
    out.push(ch);
  }
  return out;
}

/* ============================================================
   テキスト整形
   ============================================================ */
function buildNameText(c){
  let t = "名前：" + (c.name||"（名前なし）") + "\n読み：" + (c.reading||"—") + "\n英字表記：" + (c.roman||"—");
  if(c.codename) t += "\nコードネーム：" + c.codename;
  return t;
}

function buildDetailText(c){
  if(c.mode === "nameOnly"){
    return buildNameText(c) + "\n\n名前の印象：" + c.nameImpression + "\n向いているキャラ像：" + c.suitedFor;
  }
  const lines = [];
  if(c.name){
    lines.push("【名前】");
    if(c.manualName){ lines.push("名前：" + c.name); }
    else {
      lines.push("名前：" + c.name, "読み：" + c.reading, "英字表記：" + c.roman);
      if(c.codename) lines.push("コードネーム：" + c.codename);
    }
    lines.push("");
  }
  lines.push("【基本設定】",
    "年齢：" + c.age,
    "性別・印象：" + c.genderImp,
    "職業・立場：" + c.occupation,
    "世界観：" + c.worldLabel, "",
    "【外見】", c.appearance, "",
    "【人物像】",
    "性格：" + c.personality,
    "話し方：" + c.speech,
    "一人称：" + c.first,
    "二人称：" + c.second,
    "好きなもの：" + c.likes,
    "苦手なもの：" + c.dislikes,
    "強み：" + c.strength,
    "弱み：" + c.weakness,
    "秘密：" + c.secret, "",
    "【創作フック】",
    "関係性の種：" + c.relationSeed,
    "物語での役割：" + c.storyRole,
    "キャッチコピー：" + c.catch, "",
    "【画像生成用英語プロンプト素材】",
    c.imagePrompt);
  return lines.join("\n");
}

function buildImagePrompt(c){ return c.imagePrompt || ""; }

/* ============================================================
   コピー・トースト
   ============================================================ */
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 1800);
}
function showFallback(text){
  const fb = document.getElementById("copyFallback");
  document.getElementById("fbText").value = text;
  fb.classList.add("show");
}
function copyToClipboard(text, msg){
  msg = msg || "コピーしました";
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(
      () => showToast(msg),
      () => legacyCopy(text, msg)
    );
  } else {
    legacyCopy(text, msg);
  }
}
function legacyCopy(text, msg){
  try{
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    if(ok) showToast(msg); else showFallback(text);
  }catch(e){ showFallback(text); }
}

/* ============================================================
   保存（localStorage）
   ============================================================ */
function loadSavedCharacters(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    savedResults = raw ? JSON.parse(raw) : [];
    if(!Array.isArray(savedResults)) savedResults = [];
  }catch(e){
    storageOK = false; savedResults = [];
  }
}
function persistSaved(){
  if(!storageOK) return;
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(savedResults)); }
  catch(e){ storageOK = false; showToast("保存領域が使えません"); }
}
function saveCharacter(id){
  const c = generatedResults.find(x => x.id === id);
  if(!c) return;
  if(savedResults.some(s => s.id === id)){ showToast("保存済みです"); return; }
  if(!storageOK){ showToast("この環境では保存できません"); return; }
  savedResults.unshift(c);
  persistSaved();
  renderSavedCharacters();
  renderResults(generatedResults); // 保存済み表示を更新
  showToast("保存しました");
}
function deleteSavedCharacter(id){
  savedResults = savedResults.filter(s => s.id !== id);
  persistSaved();
  renderSavedCharacters();
  renderResults(generatedResults);
  showToast("削除しました");
}
function clearSavedCharacters(){
  if(!savedResults.length){ showToast("保存リストは空です"); return; }
  if(!confirm("保存リストをすべて削除します。よろしいですか？")) return;
  savedResults = [];
  persistSaved();
  renderSavedCharacters();
  renderResults(generatedResults);
  showToast("すべて削除しました");
}

/* ============================================================
   描画
   ============================================================ */
function renderModeButtons(){
  const defs = [
    {key:"nameOnly", label:"名前だけ", sub:"名前＋印象"},
    {key:"settingOnly", label:"設定だけ", sub:"名前なし"},
    {key:"full", label:"すべてお任せ", sub:"名前＋設定"}
  ];
  const nav = document.getElementById("modeBtns");
  nav.innerHTML = defs.map(d =>
    '<button class="mode-btn' + (currentMode===d.key?" on":"") + '" data-mode="' + d.key + '">' +
    d.label + '<small>' + d.sub + '</small></button>'
  ).join("");
  nav.querySelectorAll(".mode-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentMode = btn.dataset.mode;
      document.getElementById("nameInputWrap").classList.toggle("show", currentMode === "settingOnly");
      renderModeButtons();
    });
  });
}

const condConfigs = [
  {id:"world", title:"世界観", multi:false, note:"名前の系統に大きく影響します。",
    items:() => worldOrder.map(k => ({key:k, label: k==="random" ? "お任せ" : worldDefs[k].label})),
    get:() => [selectedWorld], set:(k) => { selectedWorld = k; }},
  {id:"gender", title:"性別・印象", multi:false, note:"創作上の印象として扱います。",
    items:() => genderOrder.map(k => ({key:k, label:genderDefs[k].label})),
    get:() => [selectedGender], set:(k) => { selectedGender = k; }},
  {id:"mood", title:"雰囲気（複数可）", multi:true, note:"組み合わせて印象を作ります。",
    items:() => moodOrder.map(k => ({key:k, label:k})),
    get:() => selectedMoods, set:null},
  {id:"role", title:"役割・職業（複数可）", multi:true, note:"世界観に合わせて自然に言い換えます。",
    items:() => roleOrder.map(k => ({key:k, label: k==="お任せ" ? "お任せ" : roleDefs[k].label})),
    get:() => selectedRoles, set:null},
  {id:"rel", title:"関係性タイプ（任意・複数可）", multi:true, note:"キャラを動かすための創作フックになります。",
    items:() => relOrder.map(k => ({key:k, label:k})),
    get:() => selectedRelationships, set:null}
];

function renderChoiceChips(){
  const box = document.getElementById("conditions");
  box.innerHTML = condConfigs.map((cfg, idx) => {
    const chips = cfg.items().map(it =>
      '<button class="chip' + (cfg.get().includes(it.key) ? " on":"") + '" data-cond="' + cfg.id + '" data-key="' + esc(it.key) + '">' + esc(it.label) + '</button>'
    ).join("");
    const selLabels = cfg.get().map(k => {
      const item = cfg.items().find(i => i.key === k);
      return item ? item.label : k;
    }).join("・");
    return '<details class="cond"' + (idx < 2 ? " open" : "") + '>' +
      '<summary>' + cfg.title + '<span class="sel">' + esc(selLabels || "未選択") + '</span></summary>' +
      '<div class="chip-box"><p class="cond-note">' + cfg.note + '</p>' + chips + '</div></details>';
  }).join("");
  box.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => toggleChip(chip.dataset.cond, chip.dataset.key));
  });
}

function toggleChip(condId, key){
  const cfg = condConfigs.find(c => c.id === condId);
  if(!cfg.multi){
    cfg.set(key);
  } else {
    let arr;
    if(condId === "mood") arr = selectedMoods;
    else if(condId === "role") arr = selectedRoles;
    else arr = selectedRelationships;
    const i = arr.indexOf(key);
    if(i >= 0) arr.splice(i,1); else arr.push(key);
  }
  // 開閉状態を保ったまま再描画
  const openStates = Array.from(document.querySelectorAll("details.cond")).map(d => d.open);
  renderChoiceChips();
  document.querySelectorAll("details.cond").forEach((d,i) => { d.open = openStates[i]; });
}

function cardRow(dt, dd){
  return '<div class="row"><dt>' + esc(dt) + '</dt><dd>' + esc(dd) + '</dd></div>';
}

function renderResults(results){
  const box = document.getElementById("results");
  document.getElementById("resHead").classList.toggle("show", results.length > 0);
  box.innerHTML = results.map(c => {
    const saved = savedResults.some(s => s.id === c.id);
    let inner = '<span class="world-tag">' + esc(c.worldLabel) + '</span>';

    if(c.mode === "nameOnly"){
      inner += '<p class="name-line"><span class="nm">' + esc(c.name) + '</span><span class="rd">' + esc(c.reading) + '</span></p>' +
        '<p class="roman">' + esc(c.roman) + (c.codename ? "　CODE: " + esc(c.codename) : "") + '</p><dl>' +
        cardRow("名前の印象", c.nameImpression) +
        cardRow("向いている像", c.suitedFor) + '</dl>';
    } else {
      inner += '<p class="catch">' + esc(c.catch) + '</p>';
      if(c.name){
        inner += '<p class="name-line"><span class="nm">' + esc(c.name) + '</span>' +
          (c.manualName ? "" : '<span class="rd">' + esc(c.reading) + '</span>') + '</p>' +
          (c.manualName ? "" : '<p class="roman">' + esc(c.roman) + (c.codename ? "　CODE: " + esc(c.codename) : "") + '</p>');
      }
      inner += '<dl>' +
        cardRow("年齢", c.age) +
        cardRow("性別・印象", c.genderImp) +
        cardRow("職業・立場", c.occupation) +
        '<div class="sec-label">外見</div>' + cardRow("外見", c.appearance) +
        '<div class="sec-label">人物像</div>' +
        cardRow("性格", c.personality) +
        cardRow("話し方", c.speech) +
        cardRow("一人称／二人称", c.first + " ／ " + c.second) +
        cardRow("好きなもの", c.likes) +
        cardRow("苦手なもの", c.dislikes) +
        cardRow("強み", c.strength) +
        cardRow("弱み", c.weakness) +
        cardRow("秘密", c.secret) +
        '<div class="sec-label">創作フック</div>' +
        cardRow("関係性の種", c.relationSeed) +
        cardRow("物語での役割", c.storyRole) +
        '</dl>' +
        '<div class="sec-label">画像生成用英語プロンプト素材</div>' +
        '<div class="prompt">' + esc(c.imagePrompt) + '</div>';
    }

    inner += '<div class="card-actions">' +
      '<button class="btn-sm save" data-act="save" data-id="' + c.id + '"' + (saved ? " disabled" : "") + '>' + (saved ? "保存済み" : "保存") + '</button>' +
      '<button class="btn-sm copy" data-act="detail" data-id="' + c.id + '">詳細コピー</button>' +
      (c.name && !c.manualName ? '<button class="btn-sm" data-act="name" data-id="' + c.id + '">名前だけコピー</button>' : "") +
      (c.mode !== "nameOnly" ? '<button class="btn-sm" data-act="img" data-id="' + c.id + '">画像生成用コピー</button>' : "") +
      '</div>';
    return '<article class="card">' + inner + '</article>';
  }).join("");

  box.querySelectorAll("button[data-act]").forEach(btn => {
    btn.addEventListener("click", () => {
      const c = generatedResults.find(x => x.id === btn.dataset.id);
      if(!c) return;
      const act = btn.dataset.act;
      if(act === "save") saveCharacter(c.id);
      else if(act === "detail") copyToClipboard(buildDetailText(c));
      else if(act === "name") copyToClipboard(buildNameText(c));
      else if(act === "img") copyToClipboard(buildImagePrompt(c));
    });
  });
}

function savedTitle(c){
  return c.name || c.catch || "（名前なし）";
}
function savedImpression(c){
  if(c.mode === "nameOnly") return c.worldLabel + "／" + (c.nameImpression || "");
  return c.worldLabel + "・" + (c.age || "") + "　" + (c.occupation || "");
}

function renderSavedCharacters(){
  const box = document.getElementById("savedList");
  if(!storageOK){
    box.innerHTML = '<div class="empty-msg">この環境ではブラウザ保存が使えません。生成とコピーは利用できます。</div>';
    return;
  }
  if(!savedResults.length){
    box.innerHTML = '<div class="empty-msg">まだ保存されたキャラはいません。<br>気に入った結果カードの「保存」を押してください。</div>';
    return;
  }
  box.innerHTML = savedResults.map(c =>
    '<div class="saved-item" data-id="' + c.id + '">' +
      '<div class="s-top"><span class="s-name">' + esc(savedTitle(c)) + '</span>' +
      '<span class="s-imp">' + esc(savedImpression(c)) + '</span></div>' +
      '<div class="s-detail">' + esc(buildDetailText(c)) + '</div>' +
      '<div class="s-actions">' +
        '<button class="btn-sm" data-sact="toggle">詳細表示</button>' +
        '<button class="btn-sm copy" data-sact="copy">コピー</button>' +
        '<button class="btn-sm btn-danger" data-sact="del">削除</button>' +
      '</div></div>'
  ).join("");
  box.querySelectorAll(".saved-item").forEach(item => {
    const id = item.dataset.id;
    const c = savedResults.find(s => s.id === id);
    item.querySelector('[data-sact="toggle"]').addEventListener("click", () => item.classList.toggle("open"));
    item.querySelector('[data-sact="copy"]').addEventListener("click", () => copyToClipboard(buildDetailText(c)));
    item.querySelector('[data-sact="del"]').addEventListener("click", () => deleteSavedCharacter(id));
  });
}

/* ============================================================
   生成トリガー・初期化
   ============================================================ */
function runGenerate(count){
  generatedResults = generateMultiple(count);
  renderResults(generatedResults);
  const head = document.getElementById("resHead");
  setTimeout(() => head.scrollIntoView({behavior:"smooth", block:"start"}), 60);
}

function resetConditions(){
  selectedWorld = "random";
  selectedGender = "unspecified";
  selectedMoods = [];
  selectedRoles = [];
  selectedRelationships = [];
  renderChoiceChips();
  showToast("条件をリセットしました");
}
function randomConditions(){
  selectedWorld = pick(Object.keys(worldDefs));
  selectedGender = pick(genderOrder.filter(k => k !== "unspecified"));
  selectedMoods = pickN(Object.keys(moodDefs), randInt(2,3));
  selectedRoles = [pick(Object.keys(roleDefs))];
  selectedRelationships = Math.random() < 0.5 ? [pick(Object.keys(relDefs))] : [];
  renderChoiceChips();
  showToast("条件をランダムに設定しました");
}

function init(){
  loadSavedCharacters();
  renderModeButtons();
  renderChoiceChips();
  renderSavedCharacters();
  document.getElementById("btnGen1").addEventListener("click", () => runGenerate(1));
  document.getElementById("btnGen5").addEventListener("click", () => runGenerate(5));
  document.getElementById("btnReset").addEventListener("click", resetConditions);
  document.getElementById("btnRandom").addEventListener("click", randomConditions);
  document.getElementById("btnClearSaved").addEventListener("click", clearSavedCharacters);
  document.getElementById("btnCopyAllSaved").addEventListener("click", () => {
    if(!savedResults.length){ showToast("保存リストは空です"); return; }
    const all = savedResults.map(c => buildDetailText(c)).join("\n\n――――――――――\n\n");
    copyToClipboard(all, "保存リストをコピーしました");
  });
  document.getElementById("fbClose").addEventListener("click", () => {
    document.getElementById("copyFallback").classList.remove("show");
  });
}
init();
</script>
